version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payd_db
    environment:
      POSTGRES_DB: payd
      POSTGRES_USER: payd_app
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payd_app -d payd"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
