version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: payd_db
    environment:
      POSTGRES_DB: payd
      POSTGRES_USER: payd_app
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payd_app -d payd"]
      interval: 10s
      timeout: 5s
      retries: 5

  payd:
    build: .
    container_name: payd_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://payd_app:devpassword@postgres:5432/payd?sslmode=disable
      APP_ENV: development
      PORT: 8080
      METRICS_ENABLED: "true"
      METRICS_PORT: 9090
      LOG_LEVEL: info
      RATE_LIMIT_DEFAULT: 100
      PROVIDERS_CONFIG_PATH: providers.yml
      # Credential encryption (optional in dev, required in production)
      CREDENTIALS_ENCRYPTION_KEY: ""
      # Backoffice authentication (JWT)
      BACKOFFICE_JWT_SECRET: "dev-secret-key-change-in-production-12345"
      BACKOFFICE_JWT_TTL: "24h"
      # Bootstrap: auto-create first tenant on startup (all 3 required, leave empty to disable)
      BOOTSTRAP_TENANT_NAME: ""
      BOOTSTRAP_TENANT_EMAIL: ""
      BOOTSTRAP_ADMIN_PASSWORD: ""
      # BOOTSTRAP_TENANT_SLUG: ""  # optional, auto-generated from name if not provided
      # Subscription lifecycle job configuration
      LIFECYCLE_JOB_INTERVAL: "300s"
      PAST_DUE_GRACE_PERIOD_DAYS: "7"
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - observability

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: payd_prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    depends_on:
      - payd
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11.1.0
    container_name: payd_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    profiles:
      - observability

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
