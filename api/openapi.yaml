openapi: 3.1.0
info:
  title: billax
  version: 0.1.0
  description: Multi-tenant billing and subscription management engine
  contact:
    name: billax
    url: https://github.com/DelgadoElias/billax

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.billax.io
    description: Production server (example)

paths:
  /v1/signup:
    post:
      summary: Sign up a new tenant account (public)
      operationId: signup
      tags:
        - Tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Tenant account created with API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '409':
          description: Conflict (duplicate tenant slug or email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/me:
    get:
      summary: Get current tenant info
      operationId: getTenantMe
      tags:
        - Tenant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current tenant info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/keys:
    post:
      summary: Create a new API key
      operationId: createAPIKey
      tags:
        - Tenant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateKeyRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaintextKeyResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List API keys
      operationId: listAPIKeys
      tags:
        - Tenant
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of API keys (plaintext never shown again)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListKeysResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/keys/{keyID}:
    delete:
      summary: Revoke an API key
      operationId: revokeAPIKey
      tags:
        - Tenant
      security:
        - BearerAuth: []
      parameters:
        - name: keyID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: API key revoked
        '404':
          description: API key not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/plans:
    post:
      summary: Create or get a plan (idempotent by slug)
      operationId: createPlan
      tags:
        - Plans
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '200':
          description: Plan already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List plans
      operationId: listPlans
      tags:
        - Plans
      security:
        - BearerAuth: []
      parameters:
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active status
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPlansResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/plans/{planID}:
    get:
      summary: Get a plan by ID
      operationId: getPlan
      tags:
        - Plans
      security:
        - BearerAuth: []
      parameters:
        - name: planID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update a plan
      operationId: updatePlan
      tags:
        - Plans
      security:
        - BearerAuth: []
      parameters:
        - name: planID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlanRequest'
      responses:
        '200':
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete (deactivate) a plan
      operationId: deletePlan
      tags:
        - Plans
      security:
        - BearerAuth: []
      parameters:
        - name: planID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Plan deleted
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/plans/slug/{slug}:
    get:
      summary: Get a plan by slug
      operationId: getPlanBySlug
      tags:
        - Plans
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '404':
          description: Plan not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/subscriptions:
    post:
      summary: Create a subscription (plan-based or planless)
      operationId: createSubscription
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '200':
          description: Subscription already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unsupported feature for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List subscriptions
      operationId: listSubscriptions
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [trialing, active, past_due, canceled, expired]
          description: Filter by status (repeatable)
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag (repeatable, AND semantics)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubscriptionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/subscriptions/{key}:
    get:
      summary: Get subscription by key (includes last 10 payments)
      operationId: getSubscription
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subscription details with embedded payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Update subscription (tags, metadata, amount)
      operationId: updateSubscription
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Unsupported feature for provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/subscriptions/{key}/cancel:
    post:
      summary: Cancel a subscription
      operationId: cancelSubscription
      tags:
        - Subscriptions
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSubscriptionRequest'
      responses:
        '200':
          description: Subscription canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/subscriptions/{key}/payments:
    post:
      summary: Create a payment for a subscription (idempotent by key)
      operationId: createPayment
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '200':
          description: Payment already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List payments for a subscription
      operationId: listSubscriptionPayments
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of payments for subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentsResponse'
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/payments:
    get:
      summary: List all payments for tenant
      operationId: listPayments
      tags:
        - Payments
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: query
          schema:
            type: string
          description: Filter by provider name
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/provider-credentials/{provider}:
    post:
      summary: Store provider API credentials
      operationId: setProviderCredentials
      tags:
        - Provider
      security:
        - BearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
          description: Provider name (e.g., mercadopago)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetProviderCredentialsRequest'
      responses:
        '200':
          description: Credentials stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider:
                    type: string
                  stored:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: payd_live_<key> or payd_test_<key>
      description: Tenant API key issued by billax

  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/Error'

    ValidationErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: '#/components/schemas/ValidationError'

    Error:
      type: object
      required:
        - code
        - message
        - request_id
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g., subscription_not_found, invalid_input)
          example: invalid_input
        message:
          type: string
          description: Human-readable error message
          example: "plan_id: must be a valid UUID"
        request_id:
          type: string
          description: Unique request identifier for debugging
          example: "req_01j0hk7gq9rkr1a2b3c4d5e6f7g8h9i0j"

    ValidationError:
      type: object
      required:
        - code
        - message
        - request_id
        - fields
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: invalid_input
        message:
          type: string
          description: Human-readable error message (often the first field error)
          example: "currency: must be a supported ISO 4217 currency code (got \"XYZ\")"
        request_id:
          type: string
          description: Unique request identifier for debugging
          example: "req_01j0hk7gq9rkr1a2b3c4d5e6f7g8h9i0j"
        fields:
          type: array
          description: Detailed validation errors by field
          items:
            $ref: '#/components/schemas/FieldError'
          example:
            - field: currency
              message: "must be a supported ISO 4217 currency code (got \"XYZ\")"
            - field: trial_days
              message: "must not be negative"

    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: Field name that failed validation
          example: currency
        message:
          type: string
          description: Validation error message
          example: "must be a supported ISO 4217 currency code (got \"XYZ\")"

    CreatePlanRequest:
      type: object
      required:
        - slug
        - name
        - amount
        - currency
        - interval
      properties:
        slug:
          type: string
          description: Unique identifier for the plan (lowercase, hyphens)
          example: pro-monthly
        name:
          type: string
          description: Display name
          example: Pro Monthly
        description:
          type: string
          description: Plan description
          example: Full access to all features
        amount:
          type: integer
          description: Price in minor currency units (centavos for ARS)
          example: 299900
        currency:
          type: string
          description: ISO 4217 currency code
          example: ARS
        interval:
          type: string
          enum: [day, week, month, year]
          example: month
        interval_count:
          type: integer
          description: Billing cycle multiplier (1 = monthly, 2 = bimonthly)
          example: 1
        trial_days:
          type: integer
          description: Trial period in days
          example: 14

    Plan:
      type: object
      required:
        - id
        - tenant_id
        - slug
        - name
        - amount
        - currency
        - interval
        - interval_count
        - is_active
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        amount:
          type: integer
        currency:
          type: string
        interval:
          type: string
        interval_count:
          type: integer
        trial_days:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSubscriptionRequest:
      type: object
      required:
        - provider_name
        - external_customer_id
      properties:
        plan_slug:
          type: string
          description: Plan slug (plan-based subscription)
          example: pro-monthly
        amount:
          type: integer
          description: Custom amount in minor currency units (planless subscription)
          example: 1500000
        currency:
          type: string
          description: ISO 4217 currency code (planless subscription)
          example: ARS
        interval:
          type: string
          enum: [day, week, month, year]
          description: Billing interval (planless subscription)
        interval_count:
          type: integer
          description: Billing cycle multiplier (planless subscription)
          example: 1
        provider_name:
          type: string
          example: mercadopago
        external_customer_id:
          type: string
          example: cust_abc123
        tags:
          type: array
          items:
            type: string
          example: [premium, latam]
        metadata:
          type: object
          description: Arbitrary JSON metadata

    Subscription:
      type: object
      required:
        - id
        - tenant_id
        - subscription_key
        - status
        - provider_name
        - amount
        - currency
        - interval
        - interval_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
          nullable: true
          description: Plan reference (null for planless subscriptions)
        subscription_key:
          type: string
          format: uuid
          description: Stable subscription identifier
        external_customer_id:
          type: string
        status:
          type: string
          enum: [trialing, active, past_due, canceled, expired]
        provider_name:
          type: string
        provider_subscription_id:
          type: string
          nullable: true
        amount:
          type: integer
          description: Amount in minor currency units
        currency:
          type: string
        interval:
          type: string
        interval_count:
          type: integer
        current_period_start:
          type: string
          format: date-time
          nullable: true
        current_period_end:
          type: string
          format: date-time
          nullable: true
        trial_ends_at:
          type: string
          format: date-time
          nullable: true
        canceled_at:
          type: string
          format: date-time
          nullable: true
        cancel_at_period_end:
          type: boolean
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
        payments:
          type: array
          description: Last 10 payments (embedded in GET response)
          items:
            $ref: '#/components/schemas/Payment'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePaymentRequest:
      type: object
      required:
        - provider_name
        - amount
        - currency
      properties:
        provider_name:
          type: string
          example: mercadopago
        amount:
          type: integer
          description: Amount in minor currency units
          example: 299900
        currency:
          type: string
          example: ARS
        description:
          type: string
          example: Pro Monthly — March 2026
        external_customer_id:
          type: string
          example: cust_abc123
        metadata:
          type: object
          description: Arbitrary JSON metadata

    Payment:
      type: object
      required:
        - id
        - tenant_id
        - idempotency_key
        - provider_name
        - provider_charge_id
        - amount
        - currency
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
          nullable: true
        idempotency_key:
          type: string
          format: uuid
        provider_name:
          type: string
        provider_charge_id:
          type: string
        amount:
          type: integer
          description: Amount in minor currency units
        currency:
          type: string
        status:
          type: string
          enum: [pending, succeeded, failed, refunded]
        failure_reason:
          type: string
          nullable: true
        payment_method:
          type: object
          nullable: true
          description: Non-sensitive payment metadata (brand, last_four, etc.)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SignupRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          description: Tenant company name
          example: "ACME Corp"
        email:
          type: string
          format: email
          description: Tenant admin email
          example: "admin@acme.com"

    SignupResponse:
      type: object
      required:
        - tenant
        - api_key
      properties:
        tenant:
          $ref: '#/components/schemas/Tenant'
        api_key:
          $ref: '#/components/schemas/PlaintextKeyResponse'
        warning:
          type: string
          description: Warning to store the API key securely
          example: "Store this key securely. It will not be shown again."

    Tenant:
      type: object
      required:
        - id
        - name
        - slug
        - email
        - is_active
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
          description: URL-safe tenant slug
        email:
          type: string
          format: email
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Description for the API key
          example: "CI/CD GitHub Actions"

    PlaintextKeyResponse:
      type: object
      required:
        - id
        - key
        - key_prefix
        - scopes
        - created_at
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
          description: Full API key (plaintext, only shown once)
          example: "payd_live_xxxxxxxxxxxxxxxxxxxx"
        key_prefix:
          type: string
          description: First 12 characters for identification
          example: "payd_live_xxx"
        scopes:
          type: array
          items:
            type: string
          example: ["read", "write"]
        created_at:
          type: string
          format: date-time

    APIKey:
      type: object
      required:
        - id
        - key_prefix
        - scopes
        - created_at
      properties:
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
          description: First 12 characters for identification
        scopes:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ListKeysResponse:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/APIKey'

    ListPlansResponse:
      type: object
      required:
        - plans
        - next_cursor
      properties:
        plans:
          type: array
          items:
            $ref: '#/components/schemas/Plan'
        next_cursor:
          type: string
          nullable: true
          description: Cursor for next page, null if last page

    ListSubscriptionsResponse:
      type: object
      required:
        - subscriptions
        - next_cursor
      properties:
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        next_cursor:
          type: string
          nullable: true

    ListPaymentsResponse:
      type: object
      required:
        - payments
        - next_cursor
      properties:
        payments:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        next_cursor:
          type: string
          nullable: true

    UpdatePlanRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean

    UpdateSubscriptionRequest:
      type: object
      properties:
        amount:
          type: integer
          description: New amount in minor currency units (pay-per-use)
        tags:
          type: array
          items:
            type: string
          description: Subscription tags (presence in request = update, absence = no change)
        metadata:
          type: object
          description: Arbitrary JSON metadata
        cancel_at_period_end:
          type: boolean
          description: Cancel at period end instead of immediately

    CancelSubscriptionRequest:
      type: object
      required:
        - at_period_end
      properties:
        at_period_end:
          type: boolean
          description: Cancel at end of period (true) or immediately (false)
          example: true

    SetProviderCredentialsRequest:
      type: object
      description: Provider-specific credentials (varies by provider)
      example:
        access_token: "APP_USR-xxxx"
        webhook_secret: "xxxx"
